<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App corrigée</title>
  <style>
    body { font-family: Arial, sans-serif; }
  </style>
</head>
<body>

<script>
// ================= STATE =================
const state = {
  favorites: [],
  itinReversed: false
};

// ================= HELPERS =================
function shortName(name) {
  return name ? name.split(' ')[0] : '';
}

function safeGetFavorite(idx) {
  return state.favorites[idx] || null;
}

// ================= PARTNER MODAL =================
function openPartnerModal(idx) {
  const fav = safeGetFavorite(idx);
  if (!fav) return;

  console.log("Open modal for", fav.name);
}

// ================= DELETE ASSOCIATION =================
function deleteAssociation(idx) {
  const fav = safeGetFavorite(idx);
  if (!fav) return;

  const partnerIdx = fav.partner;
  if (partnerIdx != null && state.favorites[partnerIdx]) {
    state.favorites[partnerIdx].partner = null;
  }

  fav.partner = null;
}

// ================= FETCH WITH TIMEOUT =================
async function fetchWithTimeout(url, options = {}, timeout = 8000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);

  try {
    const res = await fetch(url, {
      ...options,
      signal: controller.signal
    });

    let data = {};
    try {
      data = await res.json();
    } catch {}

    if (!res.ok) {
      throw new Error(data.message || "Erreur API");
    }

    return data;
  } finally {
    clearTimeout(id);
  }
}

// ================= UI RENDER =================
function renderItem(fav, i) {
  const div = document.createElement('div');
  div.className = 'item';

  const label = document.createElement('span');
  label.textContent = fav.name;

  const btn = document.createElement('button');
  btn.textContent = 'Associer';
  btn.addEventListener('click', () => openPartnerModal(i));

  div.appendChild(label);
  div.appendChild(btn);

  return div;
}

function render() {
  const container = document.getElementById('app');
  container.innerHTML = '';

  state.favorites.forEach((fav, i) => {
    const el = renderItem(fav, i);
    container.appendChild(el);
  });
}

// ================= INIT =================
function init() {
  state.favorites = [
    { name: "Paris", partner: null },
    { name: "Lyon", partner: null }
  ];

  render();
}

// ================= EVENTS =================
document.addEventListener('DOMContentLoaded', init);
</script>

<div id="app"></div>

</body>
</html>
